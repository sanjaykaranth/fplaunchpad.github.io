- name: CoRE Stack
  website: https://core-stack.org/
  contact_person: Aaditeshwar Seth
  contact_email: aseth@cse.iitd.ac.in
  logo: https://avatars.githubusercontent.com/u/199718002?v=4
  description: Works on climate change adaptation, combining satellite data pipelines, graph ML, and community-facing tools to support environmental planning and policy.
  history: >
    First meeting held on 19 March 2026 with Aadi Seth, KC Sivaramakrishnan, Sanjay Karanth,
    and Mukulika Maity. Discussed technical challenges including DAG-based data pipelines,
    graph embeddings for spatial modelling, NL-to-data analysis tooling, and gradual typing
    for their Python codebase.
  future_plan: >
    Fortnightly meetings going forward. Joint work anchored around two themes: Computing for
    the Commons and a joint workshop. Near-term: FPL fellows contributing to CoRE Stack's
    data library and queryability; exploring gradual typing for their codebase; and
    potentially setting up TESSERA embedding infrastructure at IIT Madras.

