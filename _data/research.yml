  - title: "Formal Verification &amp; Safety"
    tags: [PLT]
    description: >
      Applying formal methods to verify correctness and security properties of systems.
      This includes session types for safe distributed interaction, mechanised proofs for
      critical infrastructure, and compartmentalisation for mixed-language security.
