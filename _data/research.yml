  - title: "Distributed Systems &amp; Consistency"
    tags: [Systems]
    description: >
      Programming language approaches to the challenges of distributed consistency, including
      mergeable replicated data types, coordination-free transactions, and declarative models
      for eventually consistent stores. This work shows how functional abstractions can tame
      the complexity of weak consistency.
    related_opensource:
