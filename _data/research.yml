  - title: "Concurrency &amp; Parallelism"
    tags: [OCaml, Systems]
    description: >
      Building the theory and infrastructure for safe, scalable concurrent and parallel
      programming. The flagship contribution is Multicore OCaml, which introduced parallel
      domains and effect handlers into OCaml 5, alongside work on scheduling, lock-free
      data structures, and testing tools for concurrent programs.
