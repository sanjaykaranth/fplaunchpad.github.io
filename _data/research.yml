  - title: "Memory Management &amp; Runtime Systems"
    tags: [OCaml, Systems]
    description: >
      Designing and verifying the runtime substrate of functional languages, from garbage
      collectors to memory models. This work includes a mechanically verified GC for OCaml
      and techniques for reducing runtime overheads in concurrent settings.
    related_opensource:
