themes:
  - title: "Effect Handlers &amp; Language Design"
    tags: [PLT, OCaml]
    description: >
      Algebraic effect handlers offer a principled, composable abstraction for programming
      with side effects, unifying exceptions, async I/O, and coroutines under a single
      framework. This line of work spans foundational theory, compilation strategies, and
      practical integration into OCaml and WebAssembly.
    related_opensource:
