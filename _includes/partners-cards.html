<style>
.partners-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 2rem;
  margin-top: 2.5rem;
}

.partner-card {
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  padding: 2.5rem 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  text-decoration: none;
  color: inherit;
  min-height: 200px;
  transition: box-shadow 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
  background: #fff;
}

.partner-card:hover {
  box-shadow: 0 6px 20px rgba(0,0,0,0.10);
  border-color: #2a7ae2;
  transform: translateY(-2px);
  text-decoration: none;
  color: inherit;
}

.partner-logo {
  width: 120px;
  height: 120px;
  object-fit: contain;
  border-radius: 12px;
  margin-bottom: 1.25rem;
}

.partner-initials {
  width: 120px;
  height: 120px;
  border-radius: 12px;
  background: #eaf2ff;
  border: 1px solid #c5d9f5;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  font-weight: 800;
  color: #2a7ae2;
  letter-spacing: -1px;
  margin-bottom: 1.25rem;
}

.partner-name {
  font-size: 1rem;
  font-weight: 600;
  color: #333;
  line-height: 1.3;
}
</style>

<div class="partners-grid">
  {% for partner in site.data.partners %}
  <a class="partner-card" href="{{ partner.website }}" target="_blank" rel="noopener">
    {% if partner.logo %}
    <img class="partner-logo" src="{{ partner.logo }}" alt="{{ partner.name }} logo">
    {% endif %}
    <div class="partner-name">{{ partner.name }}</div>
  </a>
  {% endfor %}
</div>
