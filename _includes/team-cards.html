<style>
.people-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 0.75rem;
  margin-top: 1rem;
}
.person-card {
  border: 1px solid #e0e0e0;
  border-radius: 5px;
  padding: 0.65rem 0.85rem;
  background: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}
.person-card img {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 0.5rem;
  border: 1px solid #e0e0e0;
}
.person-card h3 { margin: 0 0 0.15rem 0; font-size: 0.9rem; font-weight: 600; }
.person-card h3 a { color: inherit; text-decoration: none; }
.person-card h3 a:hover { text-decoration: underline; }
.person-card .designation { font-size: 0.75rem; color: #666; margin: 0 0 0.4rem 0; }
.person-card .bio { font-size: 0.78rem; color: #444; margin: 0; line-height: 1.45; }
.people-section h2 {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #888;
  border-bottom: 1px solid #e0e0e0;
  padding-bottom: 0.3rem;
  margin-top: 2rem;
  margin-bottom: 0;
}
</style>

<div class="people-section">

  {% for group in site.data.team %}
  <h2>{{ group.role }}</h2>
  <div class="people-grid">

    {% for person in group.members %}
    <div class="person-card">
      <img src="{{ person.photo }}" alt="{{ person.name }}">
      <h3>
        {% if person.website %}
          <a href="{{ person.website }}" target="_blank">{{ person.name }}</a>
        {% else %}
          {{ person.name }}
        {% endif %}
      </h3>
      <p class="designation">{{ person.designation }}</p>
      <p class="bio">{{ person.bio }}</p>
    </div>
    {% endfor %}

  </div>
  {% endfor %}

</div>
